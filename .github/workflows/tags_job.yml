on:
  workflow_call:
    outputs:
      version_tag:
        description: "Version Tag"
        value: ${{ jobs.create_tags.outputs.version_tag }}
    inputs:
      branch_name:
        type: string
        description: "Current Github branch name"
        required: true
      pre_release:
        description: "Whether tag is prerelease or not"
        default: true
        type: boolean
    secrets:
      source_github_token:
          required: true

jobs:
  create_tags:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: generate semver tag and release
        id: semver_tag
        uses: ministryofjustice/opg-github-actions/actions/semver@b8868247a908f74fafe1905701391580575a6d35 # v4.3.10
        with:
          prerelease: ${{ inputs.pre_release }}
          default_bump: minor
    outputs:
      version_tag: ${{ steps.semver_tag.outputs.tag }}
